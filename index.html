          text: 'text-rose-900',

    let activeTab = 0;

    function renderSidebar() {
      const sidebarContainer = document.getElementById('sidebar-menu');
      sidebarContainer.innerHTML = '';

      businessData.forEach((item, index) => {
        const isActive = activeTab === index;
        const btnClass = isActive 
          ? `${item.theme.lightBg} ${item.theme.strongBorder} ${item.theme.text} shadow-sm font-bold` 
          : 'bg-white border-transparent text-slate-600 hover:bg-slate-50 hover:border-slate-200';
          
        const iconContainerClass = isActive 
          ? `bg-white shadow-sm ${item.theme.icon}` 
          : 'bg-slate-100 text-slate-400';

        const buttonHTML = `
          <button onclick="setActiveTab(${index})" class="w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200 text-left border ${btnClass}">
            <div class="flex items-center space-x-4">
              <div class="p-2 rounded-xl ${iconContainerClass}">
                <i data-lucide="${item.icon}" class="w-5 h-5"></i>
              </div>
              <span class="text-[15px]">${item.navTitle}</span>
            </div>
            ${isActive ? `<i data-lucide="chevron-right" class="w-4 h-4 ${item.theme.icon}"></i>` : ''}
          </button>
        `;
        
        sidebarContainer.insertAdjacentHTML('beforeend', buttonHTML);
      });
    }

    function renderMainContent() {
      const mainContainer = document.getElementById('main-content');
      const currentData = businessData[activeTab];
      const theme = currentData.theme;
      let mainHTML = '';

      // 4번째 탭(일본 소싱 전략) 렌더링 로직

        const cardsHTML = currentData.sourcingData.map(data => `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 hover:shadow-md transition-shadow">
            <div class="flex items-center space-x-4 mb-6 border-b border-slate-100 pb-4">
              <div class="p-3 bg-rose-50 text-rose-600 rounded-xl">
                <i data-lucide="${data.icon}" class="w-6 h-6"></i>
              </div>
              <h3 class="text-2xl font-bold text-slate-900">${data.category}</h3>
            </div>
            <ul class="space-y-4">
              ${data.points.map(point => `
                <li class="flex items-start space-x-3 text-slate-700">
                  <i data-lucide="check" class="w-5 h-5 flex-shrink-0 mt-1 text-rose-500"></i>
                  <span class="leading-relaxed text-[15px]">${point}</span>

        `).join('');

            <header class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10 relative overflow-hidden">

              <div class="relative z-10">
                <div class="flex items-center space-x-4 mb-4">
                  <div class="p-4 rounded-2xl ${theme.lightBg} ${theme.icon}">
                    <i data-lucide="${currentData.icon}" class="w-8 h-8"></i>
                  </div>
                  <div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">
                      ${currentData.title}
                    </h2>
                    <p class="mt-3 text-slate-600 font-medium">검토 중인 3가지 카테고리 모두 세계 최고 수준의 레퍼런스를 보유한 전략적 수입처</p>
                  </div>
                </div>
              </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-1 gap-8">
              ${cardsHTML}
            </div>
          </div>
        `;
      } 
      // 기존 1~3번째 탭 렌더링 로직
      else {
        const expansionHTML = currentData.expansion.map(item => `
          <li class="flex items-start space-x-3 text-[15px] text-slate-700">
            <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0 mt-0.5 ${theme.icon}"></i>

          </li>
        `).join('');

        const certificationHTML = currentData.certification.map(cert => `
          <div class="flex flex-col md:flex-row md:items-start group">
            <div class="md:w-1/3 py-4 md:pr-8 flex items-center md:items-start space-x-3 md:space-x-0 md:justify-end md:text-right border-l-4 md:border-l-0 md:border-r-4 pl-4 md:pl-0 mb-2 md:mb-0 transition-colors duration-200 border-slate-200 group-hover:border-slate-400">

              <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-[15px] text-slate-700 leading-loose">
                ${cert.desc}
              </div>
            </div>
          </div>

            <header class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10 relative overflow-hidden">
              <div class="absolute top-0 right-0 w-64 h-64 opacity-20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 ${theme.lightBg}"></div>
              <div class="relative z-10">
                <div class="flex items-center space-x-4 mb-6">
                  <div class="p-4 rounded-2xl ${theme.lightBg} ${theme.icon}">
                    <i data-lucide="${currentData.icon}" class="w-8 h-8"></i>
                  </div>
                  <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">

                  </h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                  <div class="flex items-start space-x-4 p-5 rounded-2xl bg-slate-50 border border-slate-100">

                    </div>
                  </div>
                  <div class="flex items-start space-x-4 p-5 rounded-2xl bg-slate-50 border border-slate-100">
                    <i data-lucide="trending-up" class="w-6 h-6 mt-0.5 ${theme.icon}"></i>
                    <div>
                      <h3 class="text-sm font-bold text-slate-500 uppercase mb-1">시장 규모</h3>
                      <p class="text-[15px] font-semibold text-slate-800 leading-snug">${currentData.market}</p>
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-8">
                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">

                    <div class="p-2.5 bg-red-50 text-red-600 rounded-xl">
                      <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900">진입 장벽</h3>
                  </div>
                  <p class="text-slate-700 leading-loose text-[15px]">
                    ${currentData.barrier}

                </section>

                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                  <div class="flex items-center space-x-3 mb-5">
                    <div class="p-2.5 bg-blue-50 text-blue-600 rounded-xl">
                      <i data-lucide="repeat" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900">재구매 및 확장성</h3>
                  </div>
                  <p class="text-slate-700 leading-loose text-[15px]">
                    ${currentData.retention}
                  </p>
                </section>
              </div>

              <div class="space-y-8">
                <section class="rounded-3xl shadow-sm border p-8 ${theme.lightBg} ${theme.border}">
                  <div class="flex items-center space-x-3 mb-5">
                    <div class="p-2.5 bg-white rounded-xl shadow-sm ${theme.icon}">
                      <i data-lucide="lightbulb" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-bold ${theme.text}">비전 및 로드맵</h3>
                  </div>
                  <p class="font-medium leading-loose text-[15px] ${theme.text}">
                    ${currentData.vision}
                  </p>
                </section>
                
                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                  <div class="flex items-center space-x-3 mb-6">
                    <div class="p-2.5 rounded-xl ${theme.lightBg} ${theme.icon}">
                      <i data-lucide="target" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900">추가 확장 제품군</h3>
                  </div>
                  <ul class="space-y-4">
                    ${expansionHTML}
                  </ul>
                </section>
              </div>
            </div>

            <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10">
              <div class="flex items-center justify-between border-b border-slate-100 pb-6 mb-8">
                <div class="flex items-center space-x-4">
                  <div class="p-3 bg-slate-100 text-slate-700 rounded-xl">
                    <i data-lucide="file-check" class="w-6 h-6"></i>
                  </div>
                  <h3 class="text-2xl font-bold text-slate-900 tracking-tight">필수 인허가 및 인증 가이드</h3>
                </div>
              </div>
              <div class="space-y-6">
                ${certificationHTML}
              </div>
            </section>

          </div>
        `;
      }

      mainContainer.innerHTML = mainHTML;
    }

    function updateView() {
      renderSidebar();
      renderMainContent();
      lucide.createIcons();
    }

    window.setActiveTab = function(index) {
      activeTab = index;
      updateView();
    };

    document.addEventListener("DOMContentLoaded", () => {
      updateView();
    });
  </script>
</body>
</html>
